# nginx — espone il gateway come /agents/ sul 443 (host projectopen.soltea.it).
#
# Da includere nel server { listen 443 ssl; } esistente, accanto a /mcp.
# Il gateway ascolta in loopback su 127.0.0.1:8182.
#
# La parte cruciale e' l'upgrade del WebSocket: senza gli header Upgrade/Connection
# la WSS non si stabilisce. Il proxy_read_timeout lungo tiene aperte le connessioni
# persistenti di agenti e orchestratrice.

# Mappa per l'header Connection (mettere a livello http{}, una sola volta).
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }

location /agents/ {
    proxy_pass http://127.0.0.1:8182/;

    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Connessioni WSS lunghe: non chiuderle per inattivita'.
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;

    # Upload degli zip dei ticket: alza il limite (coerente con GW_BLOB_MAX_BYTES).
    client_max_body_size 200m;
}

# NOTA iptables (host ]po[): la chain INPUT e' in policy DROP con una regola
# manuale per il 443. NON flushare la chain o si perde SSH. Il gateway resta in
# loopback (8182), quindi non serve aprire nuove porte verso l'esterno.
